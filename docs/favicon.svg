<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="letterGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fb923c"/>
      <stop offset="100%" stop-color="#f97316"/>
    </linearGradient>
    <linearGradient id="barGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <clipPath id="roundedClip">
      <rect width="32" height="32" rx="7"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="32" height="32" rx="7" fill="#0e1117"/>

  <!-- Subtle radial glow -->
  <circle cx="16" cy="14" r="14" fill="#f97316" opacity="0.06"/>

  <!-- F letterform — vertical stem -->
  <rect x="8" y="6" width="3.5" height="20" rx="1.5" fill="url(#letterGrad)"/>
  <!-- F letterform — top horizontal bar -->
  <rect x="8" y="6" width="15" height="3.5" rx="1.5" fill="url(#letterGrad)"/>
  <!-- F letterform — middle horizontal bar -->
  <rect x="8" y="13.5" width="11" height="3" rx="1.5" fill="url(#letterGrad)"/>

  <!-- Bottom accent bar (clipped to rounded rect) -->
  <rect x="0" y="28.5" width="32" height="3.5" fill="url(#barGrad)" clip-path="url(#roundedClip)"/>
</svg>
